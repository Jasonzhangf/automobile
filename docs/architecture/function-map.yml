# Flowy function map
# Purpose:
# - fast locate unique owner for any feature
# - prevent duplicate implementation across Go (Mac daemon) and Kotlin (Android)
# - bind feature to canonical types/builders/tests
# - prevent edits on facade/wrapper/transitional layers
version: 1
status: seed

# ---------- Mainline features ----------
owners:
  - feature_id: f001.ws_session_lifecycle
    status: active
    summary: "WebSocket session: client_hello, register, keepalive, response dispatch"
    owner_kind: go
    owner_module: services/mac-daemon/src/flows/client_session_flow.go
    canonical_types:
      - ClientSession
      - AppState
    canonical_funcs:
      - RunClientSession
      - RegisterClient
      - ResolvePending
    allowed_paths:
      - services/mac-daemon/src/blocks/ws_accept.go
      - services/mac-daemon/src/flows/client_session_flow.go
      - services/mac-daemon/src/state/state.go
    forbidden_paths:
      - services/mac-daemon/src/blocks/command_roundtrip.go
    required_tests:
      - services/mac-daemon/src/flows/client_session_flow_test.go
    required_gates:
      - go test ./services/mac-daemon/...

  - feature_id: f002.manual_command_dispatch
    status: active
    summary: "POST /exp01/command: single command roundtrip + timeout + finalize"
    owner_kind: go
    owner_module: services/mac-daemon/src/flows/command_roundtrip_flow.go
    canonical_funcs:
      - CommandRoundtripHandler
    allowed_paths:
      - services/mac-daemon/src/blocks/send_command.go
      - services/mac-daemon/src/blocks/command_roundtrip.go
      - services/mac-daemon/src/flows/command_roundtrip_flow.go
      - services/mac-daemon/src/flows/finalize_run_flow.go
    required_tests:
      - services/mac-daemon/src/flows/command_roundtrip_flow_test.go
    required_gates:
      - go test ./services/mac-daemon/...

  - feature_id: f003.artifact_upload
    status: active
    summary: "POST /exp01/artifacts: multipart upload + persist"
    owner_kind: go
    owner_module: services/mac-daemon/src/flows/artifact_upload_flow.go
    canonical_funcs:
      - ArtifactUploadHandler
    allowed_paths:
      - services/mac-daemon/src/foundation/multipart_artifact.go
      - services/mac-daemon/src/blocks/persist_uploaded_artifact.go
    required_tests:
      - services/mac-daemon/src/flows/artifact_upload_flow_test.go

  - feature_id: f004.collection_flow
    status: active
    summary: "9-state FSM collection: search/timeline -> pick -> enter detail -> task -> back -> continue"
    owner_kind: go
    owner_module: services/mac-daemon/src/flows/collection_flow.go
    canonical_types:
      - FlowContext
      - CollectionConfig
      - CollectionProfile
      - CollectionResult
      - CollectionRunResult
    canonical_states:
      - INIT, LIST_ENTRY, PICK_NEXT, ENTER_DETAIL
      - DETAIL_TASK, BACK_TO_LIST, CHECK_CONTINUE, DONE, ERROR
    canonical_funcs:
      - NewFlowContext
      - FlowContext.Run
      - FlowContext.stateXxx
      - CollectionRunHandler
    allowed_paths:
      - services/mac-daemon/src/flows/collection_flow.go
      - services/mac-daemon/src/flows/collection_types.go
      - services/mac-daemon/src/flows/collection_run_handler.go
      - services/mac-daemon/src/flows/checkpoint_helper.go
    forbidden_paths:
      - services/mac-daemon/src/blocks/*.go
    required_tests:
      - go test ./services/mac-daemon/src/flows/...
    required_gates:
      - go test ./services/mac-daemon/...
      - ./scripts/verify/check-file-lines.sh
    refactor_required:
      - "485/500 lines; extract makeCommand, jitterSleep, computeItemID to helpers"
      - "sendOpenDeepLink/sendPressKey should call blocks implicitly"

  - feature_id: f005.observe_page_block
    status: active
    summary: "dump-ui-tree-root command, parse artifact, return UiNode[]"
    owner_kind: go
    owner_module: services/mac-daemon/src/blocks/observe_page.go
    canonical_funcs:
      - ObservePage
    allowed_paths:
      - services/mac-daemon/src/foundation/ui_node.go
    required_tests:
      - services/mac-daemon/src/blocks/observe_page_test.go

  - feature_id: f006.anchor_block
    status: active
    summary: "Bounded-poll anchor check: ObservePage + EvaluateAnchor + retry"
    owner_kind: go
    owner_module: services/mac-daemon/src/blocks/anchor_block.go
    canonical_funcs:
      - AnchorBlock
    allowed_paths:
      - services/mac-daemon/src/foundation/anchor_spec.go
    forbidden_paths:
      - services/mac-daemon/src/flows/collection_flow.go
    required_tests:
      - services/mac-daemon/src/foundation/anchor_spec_test.go

  - feature_id: f007.operation_block
    status: active
    summary: "Tap/Scroll/Back/InputText ops with selector or direct coord"
    owner_kind: go
    owner_module: services/mac-daemon/src/blocks/operation_block.go
    canonical_funcs:
      - TapBlock
      - ScrollBlock
      - BackBlock
      - InputTextBlock
    refactor_required:
      - "resolveTapPoint (line 194) must reuse foundation/filter_match.go::MatchNodes"
    required_gates:
      - go test ./services/mac-daemon/...
      - ./scripts/verify/check-file-lines.sh

  - feature_id: f008.comment_like_block
    status: active
    summary: "Detect like/fav state + tap toggle"
    owner_kind: go
    owner_module: services/mac-daemon/src/blocks/comment_like_block.go
    canonical_funcs:
      - CommentLikeBlock
      - DetectCommentLikes
    required_tests:
      - services/mac-daemon/src/blocks/comment_like_block_test.go

  - feature_id: f009.scroll_collect_block
    status: active
    summary: "Scroll + collect visible items + bottom detection"
    owner_kind: go
    owner_module: services/mac-daemon/src/blocks/scroll_collect_block.go
    canonical_funcs:
      - ScrollCollectBlock

  - feature_id: f010.recovery_block
    status: active
    summary: "WS health check, app restart, reconnect wait"
    owner_kind: go
    owner_module: services/mac-daemon/src/blocks/recovery_block.go
    canonical_funcs:
      - HealthCheck
      - RecoverSession
      - RestartApp
      - WaitForReconnect

  - feature_id: f011.upgrade_check
    status: active
    summary: "APK upgrade check + manifest + download"
    owner_kind: go
    owner_module: services/mac-daemon/src/flows/upgrade_apk_manifest_flow.go
    canonical_funcs:
      - UpgradeCheckHandler
      - UpgradeApkManifestHandler

  - feature_id: f012.android_blocks
    status: active
    summary: "Android-side leaf blocks: TapBlock, FilterTargetsBlock, EvaluateAnchorBlock, ... (37 files)"
    owner_kind: kotlin
    owner_module: explore/android-daemon-lab/app/src/main/kotlin/com/flowy/explore/blocks/
    forbidden_paths:
      - services/mac-daemon/src/blocks/*.go

  - feature_id: f013.android_flows
    status: active
    summary: "Android-side flows: DaemonStartupFlow, WorkflowStepFlow, ... (13 files)"
    owner_kind: kotlin
    owner_module: explore/android-daemon-lab/app/src/main/kotlin/com/flowy/explore/flows/
    canonical_funcs:
      - DaemonStartupFlow.run
      - WorkflowStepFlow.run

  - feature_id: f014.android_foundation
    status: active
    summary: "Android pure functions: AccessibilityTargeting, OperationBackend, ... (23 files)"
    owner_kind: kotlin
    owner_module: explore/android-daemon-lab/app/src/main/kotlin/com/flowy/explore/foundation/

# ---------- pending bindings ----------
pending_bindings:
  - edge: operation_block.go::resolveTapPoint
    issue: "duplicates foundation/filter_match.go::MatchNodes"
    required_action: "refactor: reuse MatchNodes + SelectTargets"
  - edge: collection_flow.go::makeCommand
    issue: "command envelope duplicating proto.CommandEnvelope construction"
    required_action: "extract to blocks/command_helpers.go"
  - edge: collection_flow.go::jitterSleep
    issue: "duplicates foundation/timing.go::OperationDelay"
    required_action: "call foundation.OperationDelay() directly"
  - edge: packages/ empty shells
    issue: "6 packages/ dirs contain only README; code in services/mac-daemon/src/"
    required_action: "either populate packages/ or remove empty dirs"
